{% extends "base.html" %}

{% block head %}
    <title>Edit Recipe</title>
{% endblock %}

{% block body %}
<div class="selection-container" style="max-width: 900px; margin: 0 auto; padding: 20px;">
    
    <h2 style="text-align: center; color: var(--text-pink);">Edit Recipe</h2>
    
   <form action="{{ url_for('save_changes', recipe_id=recipe.id) }}" method="POST" enctype="multipart/form-data" class="meal-card" style="display: block; padding: 30px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div class="form-group">
                <label>Recipe Name</label>
                <input type="text" name="name" value="{{ recipe.name }}" class="custom-input" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label>Thumbnail</label>
                
                <input type="text" name="thumb_url" value="{{ recipe.thumb }}" class="custom-input" 
                    placeholder="Paste image URL here..." style="width: 100%; margin-bottom: 10px;">
                
                <p style="font-size: 0.8em; margin: 5px 0;">— OR —</p>
                
                <input type="file" name="thumb_file" class="custom-input" 
                    accept="image/*" style="width: 100%; padding: 10px;">
            </div>
            
            <div class="form-group">
                <label>Preparation Time</label>
                <input type="time" name="prep_time" value="{{ recipe.prep_time }}" class="custom-input" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label>Cooking Time</label>
                <input type="time" name="cooking_time" value="{{ recipe.cooking_time }}" class="custom-input" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label>Number of portions</label>
                <input type="number" name="n_portions" value="{{ recipe.n_portions }}" class="custom-input" required style="width: 100%;">
            </div>

            <div class="form-group">
                <label>Meal Type</label>
                <select name="meal_id" class="custom-input" style="width: 100%;">
                    {% for meal in meals %}
                    <option value="{{ meal.id }}" {{ 'selected' if meal.id == recipe.meal_id }}>{{ meal.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select name="category_id" class="custom-input" style="width: 100%;">
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {{ 'selected' if cat.id == recipe.category_id }}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Country</label>
                <select name="country_id" class="custom-input" style="width: 100%;">
                    {% for country in countries %}
                    <option value="{{ country.id }}" {{ 'selected' if country.id == recipe.country_id }}>{{ country.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
        </div>
       
        <h3 style="border-bottom: 2px solid var(--bright-purple); padding-bottom: 10px;">Ingredients</h3>
        <div id="ingredient-list" style="margin-top: 15px;">
            {% for ing in ingredients %}
            <div class="ingredient-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" name="ing_name[]" value="{{ ing.name }}" placeholder="Ingredient" class="custom-input" style="flex: 2;">
                <input type="number" step="0.01" name="ing_measure[]" value="{{ ing.measure }}" placeholder="Amt" class="custom-input" style="flex: 0.5;">
                <input type="text" name="ing_unit[]" value="{{ ing.units }}" placeholder="Unit" class="custom-input" style="flex: 1;">
                <button type="button" onclick="deleteIngredient(this)" class="action-btn" style="flex: 0.5;">Delete</button>
            </div>
            {% endfor %}
            
            {% if not ingredients %}
            <div class="ingredient-row" style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" name="ing_name[]" placeholder="Ingredient" class="custom-input" style="flex: 2;">
                <input type="number" step="0.01" name="ing_measure[]" placeholder="Amt" class="custom-input" style="flex: 0.5;">
                <input type="text" name="ing_unit[]" placeholder="Unit" class="custom-input" style="flex: 1;">
                <button type="button" onclick="deleteIngredient(this)" class="action-btn" style="flex: 0.5;">Delete</button>
            </div>
            {% endif %}
        </div>
        <button type="button" onclick="addIngredient()" class="action-btn" style="margin-bottom: 30px; background: var(--accent-purple);">+ Add Another Ingredient</button>

        <div class="form-group">
            <label>Description</label>
            <textarea 
                name="description" 
                class="custom-input description-box"
                required 
                placeholder="Enter recipe instructions or details here..."
            >{{ recipe.description }}</textarea> 
        </div>

        <button type="submit" class="submit-btn" style="width: 100%;">Save Recipe</button>
    </form>
</div>

<script>
function addIngredient() {
    const container = document.getElementById('ingredient-list');
    const newRow = document.createElement('div');
    newRow.className = 'ingredient-row';                             
    newRow.style = 'display: flex; gap: 10px; margin-bottom: 10px;';
    newRow.innerHTML = `
        <input type="text" name="ing_name[]" placeholder="Ingredient" class="custom-input" style="flex: 2;">
        <input type="number" name="ing_measure[]" placeholder="Amt" class="custom-input" style="flex: 0.5;">
        <input type="text" name="ing_unit[]" placeholder="Unit" class="custom-input" style="flex: 1;">
        <button type="button" onclick="deleteIngredient(this)" class="action-btn" style="flex: 0.5;">Delete</button>
    `;
    container.appendChild(newRow);
}

function deleteIngredient(button) {
    const row = button.closest('.ingredient-row');
    row.remove();
}
</script>
{% endblock %}
