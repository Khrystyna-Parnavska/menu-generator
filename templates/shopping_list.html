{% extends "base.html" %}

{% block head %}
    <title>Shopping List</title>
{% endblock %}

{% block body %}
<div class="selection-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
    
    <h2 style="text-align: center; color: var(--text-pink); margin-bottom: 30px;">Grocery Shopping List</h2>

    <form id="final-shopping-form" action="{{ url_for('shopping_list', menu_id=menu_id) }}" method="POST">
        
        <div class="meal-card" style="padding: 25px;">
            
            <div style="display: flex; gap: 10px; margin-bottom: 25px; align-items: flex-end;">
                <div style="flex: 2;">
                    <label style="font-size: 0.8em; color: var(--text-pink);">Item Name</label>
                    <input type="text" id="manual-name" class="custom-input" style="width: 100%;" placeholder="e.g. Apples">
                </div>
                <div style="flex: 0.5;">
                    <label style="font-size: 0.8em; color: var(--text-pink);">Qty</label>
                    <input type="number" step="0.01" id="manual-measure" class="custom-input" style="width: 100%;" placeholder="2">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 0.8em; color: var(--text-pink);">Unit</label>
                    <input type="text" id="manual-unit" class="custom-input" style="width: 100%;" placeholder="kg">
                </div>
                <button type="button" onclick="addManualItem()" class="action-btn" style="height: 45px; background: var(--bright-purple);">+ Add</button>
            </div>
            <div id="shopping-items-list">
                {% if items %}
                    {% for item in items %}
                        <div class="shopping-row" style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--accent-purple); {% if item.if_checked %} opacity: 0.5; text-decoration: line-through; {% endif %}">
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <input type="checkbox" onchange="toggleCheck(this)" 
                                    {% if item.if_checked %}checked{% endif %} 
                                    style="transform: scale(1.3); accent-color: var(--text-pink);">
                                
                                <input type="hidden" name="item_names[]" value="{{ item.name }}">
                                <input type="hidden" name="item_measures[]" value="{{ item.measure }}">
                                <input type="hidden" name="item_units[]" value="{{ item.units }}">
                                
                                <input type="hidden" name="item_checked[]" value="{{ '1' if item.if_checked else '0' }}">

                                <span style="font-size: 1.1em;">
                                    <strong>{{ item.name }}</strong> 
                                    <span style="opacity: 0.8;">({{ item.measure }} {{ item.units }})</span>
                                </span>
                            </div>
                            <button type="button" onclick="this.closest('.shopping-row').remove()" class="action-btn" style="padding: 5px 10px; background: transparent; color: var(--text-pink); border: 1px solid var(--text-pink);">✕</button>
                        </div>
                    {% endfor %}
                {% endif %}
            </div>

            <div style="margin-top: 30px; display: flex; gap: 15px;">
                <button type="button" id="clear-btn" class="submit-btn" style="flex: 1; background: var(--accent-purple);">Clear Completed</button>
                <button type="submit" class="submit-btn" style="flex: 1;">Save List</button>
            </div>
        </div>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('menu') }}" style="color: var(--text-pink); text-decoration: none;">← Back to Daily Menu</a>
    </div>
</div>

<script>
function addManualItem() {
    const nameInp = document.getElementById('manual-name');
    const measInp = document.getElementById('manual-measure');
    const unitInp = document.getElementById('manual-unit');
    const list = document.getElementById('shopping-items-list');

    if (nameInp.value.trim() === "") return;

    const newRow = document.createElement('div');
    newRow.className = "shopping-row";
    newRow.style = "display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--accent-purple);";
    
    newRow.innerHTML = `
        <div style="display: flex; align-items: center; gap: 15px;">
            <input type="checkbox" onchange="toggleCheck(this)" style="transform: scale(1.3); accent-color: var(--text-pink);">
            
            <input type="hidden" name="item_names[]" value="${nameInp.value}">
            <input type="hidden" name="item_measures[]" value="${measInp.value}">
            <input type="hidden" name="item_units[]" value="${unitInp.value}">
            <input type="hidden" name="item_checked[]" value="0">

            <span style="font-size: 1.1em;">
                <strong>${nameInp.value}</strong> 
                <span style="opacity: 0.8;">(${measInp.value} ${unitInp.value})</span>
            </span>
        </div>
        <button type="button" onclick="this.closest('.shopping-row').remove()" class="action-btn" style="padding: 5px 10px; background: transparent; color: var(--text-pink); border: 1px solid var(--text-pink);">✕</button>
    `;
    list.appendChild(newRow);
    nameInp.value = ""; measInp.value = ""; unitInp.value = "";
}

function toggleCheck(checkbox) {
    const row = checkbox.closest('.shopping-row');
    // Find the hidden input for 'checked' status in this specific row
    const hiddenChecked = row.querySelector('input[name="item_checked[]"]');
    
    if (checkbox.checked) {
        row.style.opacity = "0.5";
        row.style.textDecoration = "line-through";
        hiddenChecked.value = "1"; // Update to 1 for DB
    } else {
        row.style.opacity = "1";
        row.style.textDecoration = "none";
        hiddenChecked.value = "0"; // Update to 0 for DB
    }
}

document.getElementById('clear-btn').onclick = function() {
    document.querySelectorAll('.shopping-row').forEach(row => {
        if (row.querySelector('input[type="checkbox"]').checked) {
            row.remove();
        }
    });
};
</script>
{% endblock %}
